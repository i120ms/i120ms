name: Metrics
on:
  schedule: [{cron: "0 * * * *"}] # Odświeżaj co godzinę
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }} # Musisz wygenerować Classic Personal Access Token
          user: twoj-login
          template: classic
          base: header, activity, community, repositories, metadata
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_habits: yes
          plugin_habits_charts: yes
          plugin_pagespeed: yes
          plugin_pagespeed_url: https://twoja-strona.pl
          plugin_topics: yes
          plugin_topics_mode: icons
